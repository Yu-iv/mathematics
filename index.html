<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌吸引子 - 4K極致畫質演化 (Clifford Variant)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(5, 5, 5, 0.65);
            padding: 18px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: 1px rgba(255,255,255,0.08) solid;
            pointer-events: none;
        }
        h3 { margin-top: 0; margin-bottom: 6px; font-size: 14px; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; font-weight: 600; }
        .math-box {
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .param-display {
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Clifford Attractor 4K</h3>
        <div class="math-box">
            x₁ = sin(x² - y² + a)<br>
            y₁ = cos(2xy + b)
        </div>
        <div class="param-display">
            A = <span id="val-a">0.000</span><br>
            B = <span id="val-b">0.000</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 初始數學參數
        let x = 0.1;
        let y = 0.1;
        let time = 0; 

        // 高畫質核心：根據螢幕硬體自動調整縮放倍率 (Retina/4K 螢幕通常為 2 或 3)
        const dpr = window.devicePixelRatio || 1;

        // 因為畫質提升，我們將每影格渲染點數提高到 15,000 點，讓碎形細節更豐富
        const pointsPerFrame = 15000; 

        function resize() {
            // 讓畫布的物理像素擴大 dpr 倍
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            
            // 物理像素放大後，必須重設 Canvas 的坐標系，以防繪圖變形
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);

        const valA = document.getElementById('val-a');
        const valB = document.getElementById('val-b');

        function draw() {
            // 這裡的寬高使用邏輯 CSS 寬高
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // 算圖放大倍率與置中 (依據邏輯尺寸計算)
            const scale = Math.min(width, height) * 0.36;
            const cx = width / 2;
            const cy = height / 2;

            // 超高畫質的動態殘影：使用極高透明度的黑，讓粒子軌跡有細緻的消散感
            ctx.fillStyle = 'rgba(2, 2, 2, 0.04)';
            ctx.fillRect(0, 0, width, height);

            // 讓參數自動隨時間微幅演化
            const a = -0.5 + Math.sin(time * 0.004) * 1.3;
            const b = -0.9 + Math.cos(time * 0.002) * 0.9;

            valA.innerText = a.toFixed(3);
            valB.innerText = b.toFixed(3);

            // 開始繪製超精密粒子群
            for (let i = 0; i < pointsPerFrame; i++) {
                const nextX = Math.sin(x * x - y * y + a);
                const nextY = Math.cos(2 * x * y + b);

                x = nextX;
                y = nextY;

                const screenX = cx + x * scale;
                const screenY = cy + y * scale;

                // 精細調色盤：結合極光綠、星空藍與迷幻紫，色彩會隨時間與空間交織漸變
                const r = Math.floor(120 + Math.sin(time * 0.008) * 40 + x * 60);
                const g = Math.floor(190 + Math.cos(time * 0.004) * 65);
                const bVal = Math.floor(210 + Math.sin(y + time * 0.006) * 45);

                // 畫質關鍵：將點的尺寸縮小至極致（0.6 像素），並使用極低不透明度 (0.08)
                // 這樣成千上萬個點交疊時，才不會有鋸齒，而是呈現「數位薄霧」或「發光星塵」的高階質感
                ctx.fillStyle = `rgba(${r}, ${g}, ${bVal}, 0.08)`;
                ctx.fillRect(screenX, screenY, 0.6, 0.6);
            }

            time += 1;
            requestAnimationFrame(draw);
        }

        // 啟動
        resize();
        draw();
    </script>
</body>
</html>
