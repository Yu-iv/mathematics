<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaotic Attractor - Astral Stream Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030206;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(10, 8, 16, 0.75);
            padding: 18px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px rgba(255,255,255,0.08) solid;
            pointer-events: none;
        }
        h3 { margin-top: 0; margin-bottom: 6px; font-size: 13px; letter-spacing: 2px; color: #ff007f; text-transform: uppercase; font-weight: 600; }
        .math-box {
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .param-display {
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
            font-weight: bold;
        }
        .hint {
            font-size: 10px;
            color: #555;
            margin-top: 8px;
        }
    </style></head><body>

    <div class="info-panel">
        <h3>Astral Stream Map</h3>
        <div class="math-box">
            x₁ = sin(3x) * cos(y) + a * sin(x·y)<br>
            y₁ = cos(3y) * sin(x) + b * exp(-x²)
        </div>
        <div class="param-display">
            A = <span id="val-a">0.000</span><br>
            B = <span id="val-b">0.000</span>
        </div>
        <div class="hint">點擊畫面可強制隨機重置</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let x = 0.5;
        let y = 0.5;
        let time = 0; 

        const dpr = window.devicePixelRatio || 1;
        const pointsPerFrame = 35000; // 稍微提升粒子數讓圖形更飽滿

        // 隨機演變控制變數 (控制參數演變的「基因」)
        let seedA, seedB, baseA, baseB, scaleA, scaleB;
        let resetTimer = 0;
        const resetInterval = 800; // 每隔一段時間自動大洗牌

        function randomizeSystem() {
            // 隨機決定混沌參數的中心點與震盪幅度
            baseA = 0.8 + Math.random() * 0.8;   // 0.8 ~ 1.6
            baseB = 0.5 + Math.random() * 0.7;   // 0.5 ~ 1.2
            scaleA = 0.3 + Math.random() * 0.5;  // 0.3 ~ 0.8
            scaleB = 0.3 + Math.random() * 0.5;  // 0.3 ~ 0.8
            
            // 隨機頻率，避免固定的週期感
            seedA = [Math.random() * 0.01, Math.random() * 0.005];
            seedB = [Math.random() * 0.008, Math.random() * 0.004];
            
            // 重置混沌起點，避免疊加舊圖形殘影的突兀感
            x = Math.random() * 0.2 - 0.1;
            y = Math.random() * 0.2 - 0.1;
            
            // 輕微清除畫布，讓新圖形自然過渡
            ctx.fillStyle = 'rgba(3, 2, 6, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            resetTimer = 0;
        }

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            // 縮放時順便刷底色
            ctx.fillStyle = '#030206';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('click', randomizeSystem); // 允許點擊手動隨機

        const valA = document.getElementById('val-a');
        const valB = document.getElementById('val-b');

        function draw() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const scale = Math.min(width, height) * 0.26;
            const cx = width / 2;
            const cy = height / 2;

            // 調整殘影係數，使粒子線條更有流動感
            ctx.fillStyle = 'rgba(3, 2, 6, 0.04)';
            ctx.fillRect(0, 0, width, height);

            // 使用多重隨機頻率合成（模擬雜訊），讓 A 和 B 的變化軌跡不可預測
            const a = baseA + Math.sin(time * seedA[0]) * Math.cos(time * seedA[1]) * scaleA;
            const b = baseB + Math.cos(time * seedB[0]) * Math.sin(time * seedB[1]) * scaleB;

            valA.innerText = a.toFixed(3);
            valB.innerText = b.toFixed(3);

            // 動態色彩：讓色彩隨時間隨機交織演變
            const rBase = Math.floor(160 + Math.
