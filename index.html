<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaotic Attractor - Astral Stream Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030206;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(10, 8, 16, 0.75);
            padding: 18px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px rgba(255,255,255,0.08) solid;
            pointer-events: none;
        }
        h3 { margin-top: 0; margin-bottom: 6px; font-size: 13px; letter-spacing: 2px; color: #ff007f; text-transform: uppercase; font-weight: 600; }
        .math-box {
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .param-display {
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
            font-weight: bold;
        }
    </style></head><body>

    <div class="info-panel">
        <h3>Astral Stream Map</h3>
        <div class="math-box">
            x₁ = sin(3x) * cos(y) + a * sin(x·y)<br>
            y₁ = cos(3y) * sin(x) + b * exp(-x²)
        </div>
        <div class="param-display">
            A = <span id="val-a">0.000</span><br>
            B = <span id="val-b">0.000</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let x = 0.5;
        let y = 0.5;
        let time = 0; 

        const dpr = window.devicePixelRatio || 1;
        
        // Target maximum density from your optimized specification
        const maxPoints = 50000; 

        // Deterministic Loop Setup (Based on 60fps)
        const wanderDuration = 300; // 5 seconds of single point wandering
        const burstDuration = 400;  // High density evolutionary structural mapping Phase
        const totalCycle = wanderDuration + burstDuration;

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            ctx.fillStyle = '#030206';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', resize);

        const valA = document.getElementById('val-a');
        const valB = document.getElementById('val-b');

        function draw() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const scale = Math.min(width, height) * 0.26;
            const cx = width / 2;
            const cy = height / 2;

            // Higher trail decay opacity (0.06) from your design to ensure fast fading between states
            ctx.fillStyle = 'rgba(3, 2, 6, 0.06)';
            ctx.fillRect(0, 0, width, height);

            // Calculate precise progress inside the current loop timeline (0.0 to 1.0)
            const progress = (time % totalCycle) / totalCycle;

            // Fully deterministic periodic functions for dynamic parameters evolution
            // Smoothly sweeps through structurally intricate attractor zones across loops
            const a = 1.15 + Math.sin(progress * Math.PI * 2) * 0.45;
            const b = 0.55 + Math.cos(progress * Math.PI * 2) * 0.35;

            valA.innerText = a.toFixed(3);
            valB.innerText = b.toFixed(3);

            // Phase transition logic based on loop clock position
            let currentPoints = 1;
            const currentCycleTime = time % totalCycle;

            if (currentCycleTime > wanderDuration) {
                // Burst Phase: Create an evolutionary scale transition curve
                const burstProgress = (currentCycleTime - wanderDuration) / burstDuration;
                const intensity = Math.sin(burstProgress * Math.PI); // Perfect sine bell curve
                currentPoints = Math.floor(1 + Math.pow(intensity, 2) * maxPoints);
            }

            // High frequency color modulations synced to the structural timeline
            const rBase = Math.floor(160 + Math.sin(progress * Math.PI * 2) * 95);
            const gBase = Math.floor(100 + Math.cos(progress * Math.PI * 2) * 80);
            const bBase = Math.floor(200 + Math.sin(progress * Math.PI * 2) * 55);

            if (currentPoints === 1) {
                ctx.fillStyle = `rgba(${rBase}, ${gBase}, ${bBase}, 1.0)`; // Vivid travelling coordinate point
            } else {
                ctx.fillStyle = `rgba(${rBase}, ${gBase}, ${bBase}, 0.045)`; // Ethereal matrix dust
            }

            // Discrete non-linear differential map iterations
            for (let i = 0; i < currentPoints; i++) {
                const nextX = Math.sin(3 * x) * Math.cos(y) + a * Math.sin(x * y);
                const nextY = Math.cos(3 * y) * Math.sin(x) + b * Math.exp(-x * x);

                x = nextX;
                y = nextY;

                if(isNaN(x) || isNaN(y) || Math.abs(x) > 10) {
                    x = 0.1;
                    y = 0.1;
                }

                const screenX = cx + x * scale;
                const screenY = cy + y * scale;

                if (currentPoints === 1) {
                    ctx.fillRect(screenX - 1, screenY - 1, 2.5, 2.5); // Highlight single cursor node
                } else {
                    ctx.fillRect(screenX, screenY, 0.6, 0.6); // 0.6 particle texturing
                }
            }

            time += 1;
            requestAnimationFrame(draw);
        }

        resize();
        draw();
    </script></body></html>
