<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaotic Attractor - Astral Stream Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030206;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(10, 8, 16, 0.7);
            padding: 18px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px rgba(255,255,255,0.08) solid;
            pointer-events: none;
        }
        h3 { margin-top: 0; margin-bottom: 6px; font-size: 13px; letter-spacing: 2px; color: #ff007f; text-transform: uppercase; font-weight: 600; }
        .math-box {
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
            color: #999;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .param-display {
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Astral Stream Map</h3>
        <div class="math-box">
            x₁ = sin(3x) * cos(y) + a * sin(x·y)<br>
            y₁ = cos(3y) * sin(x) + b * exp(-x²)
        </div>
        <div class="param-display">
            A = <span id="val-a">0.000</span><br>
            B = <span id="val-b">0.000</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let x = 0.5;
        let y = 0.5;
        let time = 0; 

        const dpr = window.devicePixelRatio || 1;
        const pointsPerFrame = 30000; 

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);

        const valA = document.getElementById('val-a');
        const valB = document.getElementById('val-b');

        function draw() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const scale = Math.min(width, height) * 0.28;
            const cx = width / 2;
            const cy = height / 2;

            ctx.fillStyle = 'rgba(3, 2, 6, 0.035)';
            ctx.fillRect(0, 0, width, height);

            const a = 1.1 + Math.sin(time * 0.003) * 0.6;
            const b = 0.8 + Math.cos(time * 0.0015) * 0.5;

            valA.innerText = a.toFixed(3);
            valB.innerText = b.toFixed(3);

            const rBase = Math.floor(180 + Math.sin(time * 0.005) * 75);
            const gBase = Math.floor(100 + Math.cos(time * 0.002) * 100);
            const bBase = Math.floor(220 + Math.sin(time * 0.004) * 35);

            ctx.fillStyle = `rgba(${rBase}, ${gBase}, ${bBase}, 0.05)`;

            for (let i = 0; i < pointsPerFrame; i++) {
                const nextX = Math.sin(3 * x) * Math.cos(y) + a * Math.sin(x * y);
                const nextY = Math.cos(3 * y) * Math.sin(x) + b * Math.exp(-x * x);

                x = nextX;
                y = nextY;

                const screenX = cx + x * scale;
                const screenY = cy + y * scale;

                ctx.fillRect(screenX, screenY, 0.5, 0.5);
            }

            time += 1;
            requestAnimationFrame(draw);
        }

        resize();
        draw();
    </script>
</body>
</html>
